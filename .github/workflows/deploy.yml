name: build-and-deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      yanorra_sha:
        description: "Commit SHA from Yanorra repo (optional)"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Yanorra
        uses: actions/checkout@v4
        with:
          repository: DogFingerStudios/yanorra-wiki
          ref: ${{ inputs.yanorra_sha || 'master' }}
          path: yanorra-wiki

      - name: Checkout Yanorra
        uses: actions/checkout@v4
        with:
          repository: DogFingerStudios/yanorra-maps
          ref: ${{ inputs.yanorra_sha || 'master' }}
          path: yanorra-maps

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: 📂 FTP Installer
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.YANORRA_FTP_SERVER }}
          username: ${{ secrets.YANORRA_FTP_USERNAME }}
          password: ${{ secrets.YANORRA_FTP_PASSWORD }}
          server-dir: /public_html/
          local-dir: ${{github.workspace}}/dist/
          exclude: |
            **/.git*
            **/.git*/**
