name: Setup Sub-Issues and Project

on:
  workflow_dispatch:

permissions:
  issues: write
  repository-projects: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Create sub-issues, link to parent, and add all to project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parentIssueNumber = 3;

            const subIssueTitles = [
              'Generate a Layer Tool based off the project here: https://github.com/DogFingerStudios/fantasy-leaflet-map.git',
              'Generate new Tileset for use with Layer Tool',
              'Understand and create test layers manually',
              'Add Layer functionality to Layer Tool (To Be Defined)',
              'Automate the Export of PNG from Map Generator Tool here: https://github.com/DogFingerStudios/Fantasy-Map-Generator.git',
              'Automate the generation of the tileset: https://github.com/DogFingerStudios/gdal2tiles-leaflet.git',
              'Automate upload of tileset and layers to website',
            ];

            // Create each sub-issue and link it to the parent
            const createdIssues = [];

            for (const title of subIssueTitles)
            {
              const { data: newIssue } = await github.rest.issues.create({
                owner,
                repo,
                title,
                labels: ['enhancement'],
              });

              console.log(`Created issue #${newIssue.number}: ${title}`);

              await github.request(
                'POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                {
                  owner,
                  repo,
                  issue_number: parentIssueNumber,
                  sub_issue_id: newIssue.id,
                }
              );

              console.log(`Linked issue #${newIssue.number} as sub-issue of #${parentIssueNumber}`);
              createdIssues.push(newIssue);
            }

            // Get the parent issue node ID for project membership
            const { data: parentIssue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: parentIssueNumber,
            });

            // Resolve the owner's node ID — works for both orgs and users
            const ownerData = await github.graphql(`
              query($login: String!) {
                repositoryOwner(login: $login) {
                  id
                }
              }
            `, { login: owner });

            const ownerId = ownerData.repositoryOwner.id;
            console.log(`Owner node ID: ${ownerId}`);

            // Create the GitHub Project v2
            const { createProjectV2 } = await github.graphql(`
              mutation($ownerId: ID!, $title: String!) {
                createProjectV2(input: { ownerId: $ownerId, title: $title }) {
                  projectV2 {
                    id
                    url
                  }
                }
              }
            `, { ownerId, title: 'Yanorra Website v1' });

            const projectId = createProjectV2.projectV2.id;
            const projectUrl = createProjectV2.projectV2.url;
            console.log(`Created project: ${projectUrl}`);

            // Add the parent issue and all sub-issues to the project
            const allIssues = [parentIssue, ...createdIssues];

            for (const issue of allIssues)
            {
              await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item {
                      id
                    }
                  }
                }
              `, { projectId, contentId: issue.node_id });

              console.log(`Added issue #${issue.number} to project`);
            }

            console.log(`All issues added to project: ${projectUrl}`);
